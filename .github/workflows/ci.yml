name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          PORT: ${{ secrets.PORT }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          DB_URI: ${{ secrets.DB_URI }}
          JWT_ACCESS_KEY: ${{ secrets.JWT_ACCESS_KEY }}
          JWT_REFRESH_KEY: ${{ secrets.JWT_REFRESH_KEY }}
          GITHUB_CLIENT_ID: ${{ secrets.WEB_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.WEB_GITHUB_CLIENT_SECRET }}
          GITHUB_CALLBACK_URL: ${{ secrets.WEB_GITHUB_CALLBACK_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          CLI_GITHUB_CLIENT_ID: ${{ secrets.CLI_GITHUB_CLIENT_ID }}
          CLI_GITHUB_CLIENT_SECRET: ${{ secrets.CLI_GITHUB_CLIENT_SECRET }}
